version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80" # Access your app at localhost:8080
    volumes:
      - .:/var/www/html # Syncs your local code into the container
    depends_on:
      - db

  db:
    image: mysql:10.4.32 # Match this to your preferred DB version
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jsca_erp
      MYSQL_USER: root
      MYSQL_PASSWORD: 
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # Keeps database data saved between restarts

volumes:
  db_data: